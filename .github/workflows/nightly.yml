name: Nightly Insider Trading Fetch

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  fetch-and-email:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests yfinance

      - name: Fetch SEC EDGAR data
        run: python scripts/fetch_insider.py

      - name: Commit data file
        run: |
          git config user.name "samuelstocks-bot"
          git config user.email "actions@github.com"
          git add data/insider.json
          git diff --staged --quiet || git commit -m "data: nightly update"
          git push

      - name: Send email digest
        env:
          SENDER_GMAIL: ${{ secrets.SENDER_GMAIL }}
          SENDER_GMAIL_APP_PASS: ${{ secrets.SENDER_GMAIL_APP_PASS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python scripts/send_email.py
